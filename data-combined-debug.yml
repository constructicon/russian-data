         Konstruksjonen betyr at et gitt [objekt]Theme eller [en deltaker]Participant ikke besitter et visst [kjennetegn]Property og ikke er blant [de objektene eller deltakerne som har dette kjennetegnet]Set.
  examples:
    - |
         Вот, племянник, один из секретов того, почему [твоя тетя Маро]Participant не из [самых бедных]Set.
    - |
         [Он]Participant был не из [местных]Set, так как вырос в недалёком местечке, там же получил воспитание.
    - |
         ― [Вопрос]Theme ― не из [приятных]Set, но раз задан, то отвечу на него так.
    - |
